# Fly.io deploy for the ZENimator engine (Dockerfile-based). Full runbook in
# server/DEPLOY.md. App name matches what Fly's GitHub integration created; your
# engine URL is https://<app>.fly.dev.
app = "zenimator-app"
primary_region = "iad"   # pick one near your team — `fly platform regions` lists them

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 4545       # the engine binds 0.0.0.0:4545 (set in the Dockerfile)
  force_https = true         # the app is HTTPS, so the engine must be too
  auto_stop_machines = "off" # generations run for minutes — never sleep mid-run
  auto_start_machines = true
  min_machines_running = 1

  # Liveness probe: /health answers {ok:true} without a token (details need auth).
  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 2048          # explicit MiB (the "2gb" string tripped the deploy path);
                            # 1 vCPU / 2 GB — plenty for a test engine, bump later with:
                            #   fly scale vm shared-cpu-2x --memory 2048 -a zenimator-app
