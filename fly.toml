# fly.toml app configuration file generated for zenimator-app on 2026-07-14T08:05:26Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'zenimator-app'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 4545
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
