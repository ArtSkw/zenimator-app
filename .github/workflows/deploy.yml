name: Deploy UI to GitHub Pages

# Publishes the app UI only. The studio engine (server/ + workbench/) runs on
# each user's machine — the Pages-hosted UI talks to it at localhost:4545
# (loopback is exempt from mixed-content blocking in modern browsers).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm run build
        working-directory: app
        env:
          # The hosted UI defaults to the shared Fly engine (not localhost, which
          # only the owner has). Testers still only need to paste the access token.
          VITE_STUDIO_AGENT_URL: https://zenimator-app.fly.dev
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
